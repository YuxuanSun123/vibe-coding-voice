name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please remove secrets, private transcripts, and proprietary model files before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Open the app
        2. Press Ctrl+Z
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: false
  - type: textarea
    id: model
    attributes:
      label: Model directory shape
      description: List filenames only. Do not upload model files unless you own the rights to share them.
      render: text
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add logs, screenshots, or recordings if useful. Remove secrets and private text.
    validations:
      required: false
