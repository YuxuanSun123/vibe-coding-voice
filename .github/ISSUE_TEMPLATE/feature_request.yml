name: Feature request
description: Suggest an improvement or new workflow
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Current limitation
      description: What makes the current behavior hard or insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
