name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release binary
        run: cargo build --release --bin vibe-coding-voice-native

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install wixtoolset -y --no-progress
          $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          if (!(Test-Path $wixBin)) {
            $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          }
          if (!(Test-Path $wixBin)) {
            throw "WiX Toolset bin directory was not found."
          }
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare release bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "manual-${env:GITHUB_RUN_NUMBER}" }
          $bundle = "vibe-coding-voice-native-windows-$version"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item target/release/vibe-coding-voice-native.exe $bundle/
          Copy-Item target/release/*.dll $bundle/ -ErrorAction SilentlyContinue
          Copy-Item assets $bundle/assets -Recurse
          Copy-Item recording-overlay.ps1 $bundle/
          Copy-Item README.md $bundle/
          Copy-Item README.en.md $bundle/
          Copy-Item LICENSE $bundle/
          Copy-Item SECURITY.md $bundle/
          Copy-Item THIRD_PARTY_NOTICES.md $bundle/
          Copy-Item docs/MODELS.md $bundle/
          Copy-Item docs/MODELS.zh-CN.md $bundle/
          Compress-Archive -Path $bundle -DestinationPath "$bundle.zip" -Force
          Get-FileHash "$bundle.zip" -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  $bundle.zip" | Set-Content "$bundle.zip.sha256"
          }

      - name: Build MSI installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "manual-${env:GITHUB_RUN_NUMBER}" }
          $bundle = "vibe-coding-voice-native-windows-$version"
          $source = "installer-input"
          $msi = "vibe-coding-voice-native-windows-$version.msi"
          Remove-Item -Recurse -Force $source, wix\HarvestedFiles.wxs, wix\*.wixobj, wix\*.wixpdb -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $source | Out-Null
          Copy-Item "$bundle\*" $source -Recurse
          heat.exe dir $source -cg ReleaseFiles -dr INSTALLFOLDER -srd -sreg -gg -var var.SourceDir -out wix\HarvestedFiles.wxs
          candle.exe -dSourceDir="$source" -out wix\ wix\Product.wxs wix\HarvestedFiles.wxs
          light.exe -out $msi wix\Product.wixobj wix\HarvestedFiles.wixobj
          Get-FileHash $msi -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  $msi" | Set-Content "$msi.sha256"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-bundle
          path: |
            vibe-coding-voice-native-windows-*.zip
            vibe-coding-voice-native-windows-*.zip.sha256
            vibe-coding-voice-native-windows-*.msi
            vibe-coding-voice-native-windows-*.msi.sha256

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            vibe-coding-voice-native-windows-*.zip
            vibe-coding-voice-native-windows-*.zip.sha256
            vibe-coding-voice-native-windows-*.msi
            vibe-coding-voice-native-windows-*.msi.sha256
          body: |
            ## Vibe Coding Voice Native

            Windows release bundle and MSI installer for Vibe Coding Voice Native.

            ### Notes

            - Model files are not included.
            - Read `README.md` and `MODELS.zh-CN.md` before first run.
            - This release is created as a draft so maintainers can add screenshots, demo notes, and known issues before publishing.
